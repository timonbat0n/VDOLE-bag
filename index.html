<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вожатский чемоданчик</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Caveat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e74c3c">
    <link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
    /* --- ГЛОБАЛЬНЫЕ СТИЛИ --- */
    body { 
        font-family: 'Montserrat', sans-serif; 
        background: #fdf6e3; 
        margin: 0; 
        color: #2c3e50; 
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow-x: hidden; /* На всякий случай от горизонтального скролла */
    }

    /* --- ШАПКА (КРАСНАЯ) --- */
    header { 
        text-align: center; 
        padding: 50px 20px; 
        background: #e74c3c; 
        border-bottom: 6px solid #c0392b; 
        border-radius: 0 0 40px 40px; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
        position: relative; 
        z-index: 10; 
    }

    header h1 { 
        font-size: 2.2rem; 
        color: #ffffff; 
        text-transform: uppercase; 
        margin: 0; 
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }

    header h1 i { color: #ffffff; }

    header p { 
        font-family: 'Caveat', cursive; 
        font-size: 1.8rem; 
        color: rgba(255, 255, 255, 0.9); 
        margin: 10px 0 0; 
    }
    
    /* --- КОНТЕЙНЕР --- */
    .container { 
        max-width: 1000px; 
        margin: 40px auto; 
        padding: 0 20px; 
        position: relative;
        z-index: 1; /* Гарантируем, что контейнер выше фона */
    }

    /* --- ГИБКАЯ СЕТКА (Grid) --- */
    .grid-menu { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        gap: 20px; 
    }
    
    /* --- КАРТОЧКИ (БАЗОВЫЙ СТИЛЬ) --- */
    .card { 
        background: white; 
        padding: 30px 15px; 
        border-radius: 25px; 
        text-decoration: none; 
        text-align: center; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        /* "Толстая" жесткая тень снизу для эффекта объема */
        box-shadow: 0 8px 0 #ddd; 
        
        /* ПЛАВНОСТЬ ДЛЯ ВСЕХ ИЗМЕНЕНИЙ (наведение и клик) */
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        
        border: 1px solid rgba(0,0,0,0.05); 
        min-height: 140px;
        position: relative;
        top: 0; /* Базовая позиция */
    }

    /* --- ЭФФЕКТ ПРИ НАВЕДЕНИИ (Hover) --- */
    .card:hover { 
        top: -8px; /* Карточка всплывает вверх */
        /* Тень становится мягче, длиннее и прозрачнее, создавая эффект парения */
        box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
    }

    /* Иконка тоже может немного реагировать */
    .card:hover i {
        transform: scale(1.1); /* Слегка увеличивается */
    }

    /* --- ЭФФЕКТ НАЖАТИЯ (Active) --- */
    .card:active { 
        top: 4px; /* При клике карточка опускается вниз */
        /* Тень становится жесткой и короткой */
        box-shadow: 0 4px 0 #ddd; 
        transition: all 0.1s ease; /* Быстрая реакция на клик */
    }

    .card i { 
        font-size: 2.5rem; 
        margin-bottom: 15px; 
        transition: transform 0.2s ease; /* Плавность для иконки */
    }

    .card h3 { 
        margin: 0; 
        font-size: 0.9rem; 
        font-weight: 800; 
        text-transform: uppercase; 
        line-height: 1.2;
    }

    /* Цвета карточек (рамки и иконки) */
    .card-red { border-bottom-color: #e74c3c; color: #e74c3c; }
    .card-blue { border-bottom-color: #3498db; color: #3498db; }
    .card-green { border-bottom-color: #2ecc71; color: #2ecc71; }
    .card-orange { border-bottom-color: #f39c12; color: #f39c12; }
    .card-purple { border-bottom-color: #9b59b6; color: #9b59b6; }
    .card-teal { border-bottom-color: #1abc9c; color: #1abc9c; }
    .card-dark { border-bottom-color: #34495e; color: #34495e; }

    /* --- АДАПТИВНОСТЬ ПОД ЭКРАНЫ --- */
    @media (max-width: 900px) {
        .grid-menu { grid-template-columns: repeat(3, 1fr); } 
    }

    @media (max-width: 600px) {
        .grid-menu { grid-template-columns: repeat(2, 1fr); } 
        header h1 { font-size: 1.6rem; }
        .container { margin-top: 25px; }
        
        /* На мобильных отключаем эффект всплытия, оставляем только клик */
        .card:hover { top: 0; box-shadow: 0 8px 0 #ddd; }
        .card:hover i { transform: scale(1); }
    }

    footer { 
        margin-top: auto; 
        text-align: center; 
        padding: 40px; 
        font-family: 'Caveat'; 
        font-size: 1.6rem; 
        color: #bdc3c7; 
    }

    /* --- КРУГЛЫЙ БЕЙДЖ (ПЕЧАТЬ) --- */
        .circle-badge {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px; /* Уменьшили размер, чтобы не мешал */
            height: 100px;
            z-index: 1000;
            pointer-events: none; /* Чтобы не мешал кликать по карточкам */
        }

        .circle-badge svg {
            width: 100%;
            height: 100%;
            animation: rotate-badge 15s infinite linear; /* Скорость вращения */
        }

        .circle-badge text {
            font-family: 'Montserrat';
            font-weight: 800;
            font-size: 10px;
            fill: #e74c3c; /* Цвет текста в тон хедеру */
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .badge-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: #e74c3c;
        }

        /* АНИМАЦИЯ ВРАЩЕНИЯ */
        @keyframes rotate-badge {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Скрываем на мобилках, чтобы не перекрывал кнопки */
        @media (max-width: 600px) {
            .circle-badge { display: none; }
        }
</style>
</head>
