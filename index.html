<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вожатский чемоданчик</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Caveat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e74c3c">
    <link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
    /* --- ГЛОБАЛЬНЫЕ СТИЛИ --- */
    body { 
        font-family: 'Montserrat', sans-serif; 
        background: #fdf6e3; 
        margin: 0; 
        color: #2c3e50; 
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* --- ШАПКА (КРАСНАЯ) --- */
    header { 
        text-align: center; 
        padding: 60px 20px; 
        background: #e74c3c; 
        border-bottom: 6px solid #c0392b; 
        border-radius: 0 0 40px 40px; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
        position: relative; 
        z-index: 10; 
    }

    header h1 { 
        font-size: 2rem; 
        color: #ffffff; 
        text-transform: uppercase; 
        margin: 0; 
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }

    header p { 
        font-family: 'Caveat', cursive; 
        font-size: 1.6rem; 
        color: rgba(255, 255, 255, 0.9); 
        margin: 10px 0 0; 
    }
    
    /* --- КОНТЕЙНЕР --- */
    .container { 
        max-width: 1100px; 
        margin: 40px auto; 
        padding: 0 25px; 
    }

    /* --- АДАПТИВНАЯ СЕТКА (Grid) --- */
    .grid-menu { 
        display: grid; 
        /* На ПК карточки минимум 280px, на мобилках автоматически 1 в ряд */
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 30px; /* Много "воздуха" между карточками */
    }
    
    /* --- КАРТОЧКИ --- */
    .card { 
        background: white; 
        padding: 40px 20px; 
        border-radius: 30px; 
        text-decoration: none; 
        text-align: center; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        box-shadow: 0 10px 0 #ddd; /* Объемная тень снизу */
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        border: 1px solid rgba(0,0,0,0.05); 
        position: relative;
        top: 0;
    }

    /* ЭФФЕКТ ПРИ НАВЕДЕНИИ (Hover) */
    @media (min-width: 601px) {
        .card:hover { 
            top: -10px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        .card:hover i {
            transform: scale(1.1);
        }
    }

    /* ЭФФЕКТ НАЖАТИЯ (Active) */
    .card:active { 
        top: 5px;
        box-shadow: 0 4px 0 #ddd; 
        transition: all 0.1s ease;
    }

    .card i { 
        font-size: 3rem; 
        margin-bottom: 20px; 
        transition: transform 0.3s ease;
    }

    .card h3 { 
        margin: 0; 
        font-size: 1rem; 
        font-weight: 800; 
        text-transform: uppercase; 
        line-height: 1.3;
        letter-spacing: 0.5px;
    }

    /* ЦВЕТА КАРТОЧЕК (Нижний бортик и иконки) */
    .card-red { border-bottom: 8px solid #e74c3c; color: #e74c3c; }
    .card-blue { border-bottom: 8px solid #3498db; color: #3498db; }
    .card-green { border-bottom: 8px solid #2ecc71; color: #2ecc71; }
    .card-orange { border-bottom: 8px solid #f39c12; color: #f39c12; }
    .card-purple { border-bottom: 8px solid #9b59b6; color: #9b59b6; }
    .card-teal { border-bottom: 8px solid #1abc9c; color: #1abc9c; }
    .card-dark { border-bottom: 8px solid #34495e; color: #34495e; }

    /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
    @media (max-width: 600px) {
        .grid-menu { 
            grid-template-columns: 1fr; /* Строго одна карточка в ряд */
            gap: 25px; /* Воздух между плашками */
        }
        
        .card {
            padding: 45px 20px; /* Крупнее для удобства нажатия */
        }

        header h1 { font-size: 1.6rem; }
        .container { margin-top: 25px; }
    }

    /* --- КРУГЛЫЙ БЕЙДЖ (ПЕЧАТЬ) --- */
    .circle-badge {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 100px;
        height: 100px;
        z-index: 1000;
        pointer-events: none;
    }

    .circle-badge svg {
        width: 100%;
        height: 100%;
        animation: rotate-badge 15s infinite linear;
    }

    .circle-badge text {
        font-family: 'Montserrat';
        font-weight: 800;
        font-size: 10px;
        fill: #e74c3c;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .badge-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1.5rem;
        color: #e74c3c;
    }

    @keyframes rotate-badge {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
        .circle-badge { display: none; } /* Скрываем на телефонах */
    }

    footer { 
        margin-top: auto; 
        text-align: center; 
        padding: 40px; 
        font-family: 'Caveat'; 
        font-size: 1.6rem; 
        color: #bdc3c7; 
    }
</style>

</head>

    <div class="circle-badge">
